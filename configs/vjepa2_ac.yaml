model: "vjepa2_ac"
max_seq_len: 16384

# Uses facebook/vjepa2-ac-vitg (from HF_MODELS["vjepa2_ac"] in
# mminf/model/registry.py).  NOTE: AC checkpoint loading is deferred — for
# now VJepa2ACModel instantiates with weights materialized but not filled;
# populate them manually or pass skip_weight_loading=True and load yourself.

node_groups:
  - node_names:
      - video_encoder
    ranks:
      - 0

  - node_names:
      - predictor
    ranks:
      - 0
