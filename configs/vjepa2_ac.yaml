model: "vjepa2"
max_seq_len: 16384

# V-JEPA 2-AC: ViT-g encoder + action-conditioned predictor.
# NOTE: AC weight loading from upstream ``.pt`` format is not yet wired in
# — for now use skip_weight_loading=True and populate weights manually, or
# wait for the follow-up loader.
model_kwargs:
  model_path_hf: "facebook/vjepa2-ac-vitg"
  predictor_kind: "ac"
  ac_predictor_config:
    action_embed_dim: 7
    use_extrinsics: false

node_groups:
  - node_names:
      - video_encoder
    ranks:
      - 0

  - node_names:
      - predictor
    ranks:
      - 0
