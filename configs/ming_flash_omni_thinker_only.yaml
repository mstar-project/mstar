# Ming-flash-omni-2.0 — thinker-only deploy (text out, no talker).
#
# Step 3d: registers only the Thinker node; audio_encoder, vision_encoder,
# Talker, AudioVAE land at step 4+. Single-rank by default — TP-aware
# variants of LingAttention / LingMoeBlock land at step 3e, so a single
# rank here will OOM trying to fit all 100B params on one GPU. Useful
# right now for: (a) engine startup smoke (does the model class load
# correctly?), (b) catching plumbing bugs before TP infrastructure is
# in place. Real serving needs TP=4 across 4 H100s (step 3e).

model: "ming_flash_omni"
max_seq_len: 32768
node_groups:
  - node_names: [Thinker]
    ranks: [0]
