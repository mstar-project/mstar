name: CI
on:
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Run Ruff
        # Use GitHub’s annotation format so lint errors show inline
        run: ruff check --output-format=github .
  # Vendored Rust transport (rust/): cargo tests, then the pyzmq interop
  # pytest against a freshly built extension.
  rust-transport:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            rust
            rust/server
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install libzmq
        run: sudo apt-get update && sudo apt-get install -y libzmq3-dev
      - name: Cargo tests (transport semantics)
        working-directory: rust
        run: cargo test --release
      - name: Build the Rust frontend (mstar-server)
        working-directory: rust/server
        run: cargo build --release
      - name: Build and install the extension
        working-directory: rust
        run: |
          python -m pip install --upgrade pip maturin
          maturin build --release
          pip install target/wheels/*.whl
      - name: Interop tests (transport, frontend)
        run: |
          pip install pytest pyzmq msgpack
          # the package itself, without its (heavy) deps — these test
          # chains need only pyzmq + msgpack + stdlib
          pip install --no-deps -e .
          pytest test/rust/test_rust_communicator.py -v
